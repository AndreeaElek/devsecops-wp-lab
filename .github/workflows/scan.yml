[span_6](start_span)name: WordPress WPScan - Vulnerability Discovery[span_6](end_span)

on:
  push:
    [span_7](start_span)branches: [ main ][span_7](end_span)

jobs:
  wordpress-wpscan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        [span_8](start_span)uses: actions/checkout@v4[span_8](end_span)

      - name: Set up Docker
        run: |
          [span_9](start_span)docker version[span_9](end_span)

      - name: Start MySQL
        run: |
          docker run -d --name wp-db \
            -e MYSQL_ROOT_PASSWORD=password \
            -e MYSQL_DATABASE=wordpress \
            -e MYSQL_USER=wpuser \
            -e MYSQL_PASSWORD=wppass \
            -p 3306:3306 \
            [span_10](start_span)mysql:5.7[span_10](end_span)

      - name: Start WordPress
        run: |
          docker run -d --name wp-site \
