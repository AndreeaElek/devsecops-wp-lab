name: WordPress WPScan
on:
  push:
    branches: [main]
jobs:
  wordpress-wpscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker environment
        run: |
          docker run -d --name wp-db -e MYSQL_ROOT_PASSWORD=password -e MYSQL_DATABASE=wordpress -e MYSQL_USER=wpuser -e MYSQL_PASSWORD=wppass mysql:5.7
      - name: Start WordPress container
        run: |
          DB_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' wp-db)
          docker run -d --name wp-site -e WORDPRESS_DB_HOST=$DB_IP:3306 -e WORDPRESS_DB_USER=wpuser -e WORDPRESS_DB_PASSWORD=wppass -e WORDPRESS_DB_NAME=wordpress -p 8080:80 wordpress:latest
      - name: Wait for WordPress to be ready
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080 > /dev/null; then echo "WordPress is ready!"; exit 0; fi
            echo "Waiting for WordPress..."; sleep 10
          done
          exit 1
      - name: Install Ruby and WPScan
        run: |
          sudo apt-get update && sudo apt-get install -y ruby-full
          sudo gem install wpscan
      - name: Run WPScan
        run: |
          wpscan --url http://localhost:8080 --enumerate vp,vt,u --ignore-main-redirect || true



