            -e WORDPRESS_DB_USER=wpuser \
            -e WORDPRESS_DB_PASSWORD=wppass \
            -e WORDPRESS_DB_NAME=wordpress \
            -p 8080:80 \
            [span_11](start_span)wordpress:5.8[span_11](end_span)

      - name: Wait for WordPress
        run: |
          [span_12](start_span)echo "Waiting for WordPress to start..."[span_12](end_span)
          [span_13](start_span)sleep 30[span_13](end_span)

      - name: Install WPScan
        run: |
          [span_14](start_span)sudo apt-get update[span_14](end_span)
          [span_15](start_span)sudo apt-get install -y ruby-full build-essential libcurl4-openssl-dev zlib1g-dev[span_15](end_span)
          [span_16](start_span)sudo gem install wpscan[span_16](end_span)

      - name: Run WPScan
        run: |
          [span_17](start_span)wpscan --url http://localhost:8080 --enumerate u,vp,vt --force --format cli-no-color[span_17](end_span)
